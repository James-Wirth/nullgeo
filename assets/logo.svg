<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 160" fill="none" role="img" aria-label="nullgeo">
  <title>nullgeo</title>
  <style>
    .fg   { fill: #1f2937; }
    .cone { stroke: #4f46e5; }
    @media (prefers-color-scheme: dark) {
      .fg   { fill: #f5f5f2; }
      .cone { stroke: #a5b4fc; }
    }
  </style>

  <g class="cone" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <g stroke-dasharray="2 3" opacity="0.5">
      <path d="M 20 36 A 40 7 0 0 0 100 36"/>
      <path d="M 20 36 A 40 7 0 0 1 100 36"/>

      <path d="M 20 124 A 40 7 0 0 0 100 124"/>
      <path d="M 20 124 A 40 7 0 0 1 100 124"/>
    </g>

    <path d="M 20 36 L 60 80 L 20 124"/>
    <path d="M 100 36 L 60 80 L 100 124"/>
  </g>

  <text x="135" y="80" dominant-baseline="central" class="fg"
        font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="92" font-weight="800" letter-spacing="-3">nullgeo</text>
</svg>
